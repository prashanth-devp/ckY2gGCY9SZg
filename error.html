<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
          href="https://fonts.googleapis.com/css2?family=Rethink+Sans:ital,wght@0,400..800;1,400..800&display=swap"
          rel="stylesheet"
  />
  <style>
    body {
      margin: 0;
      font-family: "Rethink Sans", sans-serif;
    }

    #opal-main {
      background-image: url("https://prashanth-devp.github.io/ckY2gGCY9SZg/assets/images/landingBackground.png");
      height: 100vh;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background-color: white;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .headline {
      margin: 2rem 0;
      font-size: 40px;
      line-height: 44px;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.02em;
      background: linear-gradient(95.65deg, #4593a7 0%, #359963 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
    }

    .container {
      background-color: white;
      box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
      padding: 2rem;
      max-width: 400px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    #api .heading h1 {
      font-size: 1.5rem;
      font-weight: 400;
      margin: 0;
    }

    #api .intro h2 {
      color: #6b7280;
      margin-top: 0.25rem;
      font-size: 1em;
      font-weight: normal;
    }

    #api button {
      width: 100%;
      background-color: rgb(47 125 146 / var(--tw-bg-opacity, 1));
      color: white;
      font-weight: 700;
      padding: 0.75rem;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s ease-in-out;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
<div id="opal-main">
  <header>
    <img
            src="https://prashanth-devp.github.io/ckY2gGCY9SZg/assets/images/logo.svg"
            alt="Logo"
            style="height: 1.5rem"
    />
  </header>

  <div class="p-4">
    <h1 class="headline">See clearly, shop simply.</h1>

    <div class="container" role="presentation">
      <div id="api"></div>
    </div>
  </div>
</div>
</body>
</html>
