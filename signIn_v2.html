<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rethink+Sans:ital,wght@0,400..800;1,400..800&display=swap"
      rel="stylesheet"
    />
    <script src="https://prashanth-devp.github.io/ckY2gGCY9SZg/assets/scripts/signin_v2.js" defer></script>
    <script src="https://prashanth-devp.github.io/ckY2gGCY9SZg/assets/scripts/verify-signin.js"></script>
    <script src="https://prashanth-devp.github.io/ckY2gGCY9SZg/assets/scripts/common.js" defer></script>
    <style>
      body {
        margin: 0;
        font-family: "Rethink Sans", sans-serif;
      }

      #opal-main {
        background-image: url("https://prashanth-devp.github.io/ckY2gGCY9SZg/assets/images/landingBackground.png");
        height: 100vh;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 2rem;
        background-color: white;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      }

      .headline {
        margin: 2rem 0;
        font-size: 40px;
        line-height: 44px;
        font-weight: 700;
        text-align: center;
        letter-spacing: -0.02em;
        background: linear-gradient(95.65deg, #4593a7 0%, #359963 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        color: transparent;
      }

      .container {
        background-color: white;
        box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
        padding: 2rem 2rem 1.5rem 2rem;
        max-width: 400px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        /* min-height: 459px; */
      }

      .heading {
        font-size: 1.5rem;
        font-weight: 400;
        margin: 0;
      }

      .intro {
        color: #6b7280;
        margin-top: 0.25rem;
      }

      .intro p {
        margin-top: 6px;
      }

      .input-wrapper {
        margin-bottom: 1.5rem;
      }

      label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: #111827;
        line-height: 20px;
        font-family: "Rethink Sans", sans-serif;
        margin-top: 16px;
      }

      input {
        width: 100%;
        border: none;
        border-bottom: 1px solid #111827; /* Tailwind's gray-900 */
        background-color: transparent;
        font-size: 1rem;
        color: #111827;
        box-sizing: border-box;
        padding: 1rem;
      }

      input::placeholder {
        color: #9ca3af;
        font-size: 1rem;
      }

      input:focus {
        outline: none;
      }

      /* Primary button (Continue / Login) — Figma: Background-Primary-Default + Content-Inverse. */
      #api button {
        width: 100%;
        height: 56px;
        background-color: #2f7d92; /* Background-Primary-Default */
        color: #fff; /* Content-Inverse */
        font-weight: 700;
        font-size: 1rem;
        line-height: 1.5rem;
        padding: 1rem 2rem; /* py-4 px-8 */
        border: none;
        cursor: pointer;
        transition: background-color 0.2s ease-in-out;
        margin-top: 16px;
      }

      /* Tertiary button ("Sign up") — Figma: text-only, Content-Tertiary-Default, base bold. */
      #api button.link {
        color: #2f7d92; /* Content-Tertiary-Default */
        font-weight: 700;
        font-size: 1rem;
        line-height: 1.5rem;
        text-decoration: none;
        background: none;
        padding: 0;
        height: 20px;
      }

      #api button.link:hover {
        /* text-decoration: underline; */
        cursor: pointer;
      }

      .claims-provider-list-buttons.social {
        margin-top: 0.5rem;
      }

      .separator {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin: 4px 0;
        color: #9ca3af;
        font-size: 0.875rem;
        margin-top: 24px;
      }

      .separator hr {
        flex: 1;
        border: none;
        border-top: 1px solid #d1d5db;
      }

      .error {
        color: #ef4444;
        font-size: 0.875rem;
        margin-top: 0.5rem;
      }

      /* Heading + intro are injected by ADB2C from the policy (ux.signin.en). Styling per Figma. */
      #api .heading h1 {
        color: #1a1a1a;
        font-size: 22px;
        font-weight: 500;
        line-height: 1.5rem;
        margin: 0;
        font-family: "Rethink Sans", sans-serif;
        letter-spacing: -1.75%;
      }

      #api .intro h2 {
        color: #5a6a72;
        margin-top: 0.25rem;
        font-size: 18px;
        font-weight: 400;
        line-height: 1.5rem;
        letter-spacing: 0.75%;
        margin-block-end: 1.5em;
        font-family: "Rethink Sans", sans-serif;
      }

      #api .rememberMe {
        display: flex;
        align-items: center;
        gap: 6px;
        margin: 16px 0;
      }

      #api .rememberMe input {
        width: auto;
      }

      #api .password-label {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      #api .entry-item {
        margin-bottom: 16px;
      }

      #api .divider {
        display: none;
      }

      #api .create {
        display: none;
      }

      #api #forgotPassword {
        display: none;
      }

      .flex {
        display: flex !important;
      }
      .none {
        display: none !important;
      }

      #api form#attributeVerification > .buttons {
        display: none;
        flex-direction: row-reverse;
        gap: 6px;
      }

      #api a.helpLink.tiny {
        display: none;
      }

      #api div#attributeList ul {
        list-style: none;
        padding: 0;
      }

      #api .attrEntry {
        margin: 16px 0;
      }

      #api button#emailVerificationControl_but_verify_code {
        margin-bottom: 8px;
      }

      #api .newPassword_li {
        display: none;
      }

      #api .reenterPassword_li {
        display: none;
      }

      #api .options {
        display: none;
      }

      .claims-provider-list-buttons.social .intro {
        display: none;
      }

      @keyframes spin-ease {
        0% {
          transform: rotate(0deg);
          animation-timing-function: ease-in;
        }
        50% {
          transform: rotate(180deg);
          animation-timing-function: ease-out;
        }
        100% {
          transform: rotate(360deg);
        }
      }

        width: 35px;
        height: 30px;

        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        animation: spin-ease 1s infinite;
      }

      /* Secondary button (OTP login) — Figma: Background-Secondary-Default, Stroke/Content-Secondary-Default, bold.
         Hidden on the identifier step by signin_v2.js; styled here for when it renders. */
      #api #PhoneSignInExchange {
        background: #fff; /* Background-Secondary-Default */
        color: #5a6a72; /* Content-Secondary-Default */
        border: 1px solid #5a6a72; /* Stroke-Secondary-Default */
        font-weight: 700;
        margin-bottom: 8px;
      }

      #api[data-name="SelfAsserted"] {
        display: block !important;
      }
    </style>
  </head>
  <body>
    <div id="opal-main">
      <header>
        <img src="https://prashanth-devp.github.io/ckY2gGCY9SZg/assets/images/logo.svg" alt="Logo" style="height: 1.5rem" />
      </header>

      <div class="p-4">
        <h1 class="headline">See clearly, shop simply</h1>

        <!-- Login Box -->
        <div class="container unified_container signIn" role="presentation">
          <div id="api" class="signIn"></div>
          <!-- REPLACE END -->
          <div id="error" class="error"></div>
        </div>
      </div>
    </div>
  </body>
</html>
