<!DOCTYPE html>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Rethink+Sans:ital,wght@0,400..800;1,400..800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="https://prashanth-devp.github.io/ckY2gGCY9SZg/assets/css/common.css" />
  <script src="https://prashanth-devp.github.io/ckY2gGCY9SZg/assets/scripts/shared.js" defer></script>
  <script src="https://prashanth-devp.github.io/ckY2gGCY9SZg/assets/scripts/phone-number.js" defer></script>
  <script>
    try {
      if (sessionStorage.getItem('b2c_collected_phone')) {
        document.documentElement.classList.add('auto-advancing');
      }
    } catch (e) {}
  </script>
  <style>
    html.auto-advancing body > * {
      display: none !important;
    }
    html.auto-advancing::after {
      content: '';
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
    }
    body {

    }

    #opal-main {
      background-image: url("https://prashanth-devp.github.io/ckY2gGCY9SZg/assets/images/landingBackground.png");

    .container {

      border-bottom: 1px solid #111827;

<body>
<div id="opal-main">
  <header>
    <img
      src="https://prashanth-devp.github.io/ckY2gGCY9SZg/assets/images/logo.svg"
      alt="Logo"
      style="height: 1.5rem"
    />
  </header>

  <div class="p-4">
    <h1 class="headline">See clearly, shop simply with Opal</h1>

    <div class="container unified_container" role="presentation">
      <div id="api"></div>
      <div id="error" class="error"></div>
    </div>
  </div>
</div>

<!--
  Identifier-first sign-in hand-off.
  When the user enters a phone number on the login screen, signin_v2.js stores it
  in sessionStorage ('b2c_collected_phone') before routing here. This page is the
  "enter your phone number" step of the phone sign-in journey, so we pre-fill that
  number and advance automatically — the user is never asked for it twice.
  Self-contained (no dependency on the external assets/scripts) so it deploys with
  this HTML. Polls until ADB2C marks the Continue button enabled before clicking.
-->
<script>
  (function () {
    var KEY = 'b2c_collected_phone';
    var carried;
    try { carried = sessionStorage.getItem(KEY); } catch (e) { return; }
    if (!carried) return;
    try { sessionStorage.removeItem(KEY); } catch (e) {}

    var digits = carried.replace(/\D/g, '');
    if (digits.length === 11 && digits.charAt(0) === '1') {
      digits = digits.slice(1);
    }
    if (digits.length !== 10) return;
    var e164 = '+1' + digits;

    function formatted(d) {
      return '+1 ' + d.slice(0, 3) + ' ' + d.slice(3, 6) + ' ' + d.slice(6, 10);
    }

    function setNativeValue(input, value) {
      var setter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value').set;
      setter.call(input, value);
      input.dispatchEvent(new Event('input', { bubbles: true }));
      input.dispatchEvent(new Event('change', { bubbles: true }));
    }

    var tries = 0;
    var MAX_TRIES = 100; // ~10s at 100ms
    var timer = setInterval(function () {
      tries++;

      // ADB2C renders the phone claim as #phone (sign-in) or #phoneNumber.
      var phone = document.getElementById('phone') || document.getElementById('phoneNumber');
      var continueBtn = document.getElementById('continue');

      if (phone && phone.value !== e164) {
        setNativeValue(phone, e164);
        // Keep phone-number.js's visible masked field in sync if present.
        var display = document.getElementById('formatted-phone');
        if (display && !display.value) {
          display.value = formatted(digits);
        }
      }

      // Treat the button as enabled only when ADB2C has truly enabled it — check
      // BOTH the aria flag and the disabled property — so we don't click a still
      // disabled button. Keep polling after the click (the page unloads on a
      // successful submit; if it didn't take, the next tick retries) instead of
      // giving up after a single click.
      var enabled = continueBtn &&
        continueBtn.getAttribute('aria-disabled') !== 'true' &&
        !continueBtn.disabled;

      if (continueBtn && enabled && phone && phone.value === e164) {
        continueBtn.click();
      }

      if (tries >= MAX_TRIES) {
        clearInterval(timer);
      }
    }, 100);
  })();
</script>

</body>
</html>
